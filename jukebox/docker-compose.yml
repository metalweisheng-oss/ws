version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    volumes:
      - ./data:/data
    environment:
      PORT: '4000'
      DB_PATH: /data/jukebox.db
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
    depends_on:
      - backend
